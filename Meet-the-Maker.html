<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a29bfe">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<title>Meet the Makers</title>
    <link rel="icon" href="favicon_BB.jpeg" type="image/jpeg">
<style>
/* ================= BASIC RESET ================= */
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* ================= BODY ================= */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  transition: background 0.5s ease;
}

/* Dark mode background */
body.dark {
  background: linear-gradient(135deg, #08060a, #2b2a36);
  color: #eee;
}

/* ================= STAR BACKGROUND ================= */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: .8;
  animation: twinkle 3s infinite;
  box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
}

@keyframes twinkle {
  0% { opacity: .2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.5); }
  100% { opacity: .2; transform: scale(0.8); }
}

/* ================= TOGGLE DARK MODE ================= */
#toggleMode {
  position: fixed;
  top: 25px;
  right: 25px;
  padding: 12px 16px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 22px;
  cursor: pointer;
  z-index: 10;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

#toggleMode:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.1);
}

/* ================= TEAM CONTAINER ================= */
.team-container {
  position: relative;
  z-index: 1; 
  width: 100%;
  max-width: 1200px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  padding: 120px 20px 50px;
}

/* ================= CARD ================= */
.card {
  width: 100%;
  max-width: 340px; /* Increased size */
  height: 440px;    /* Fixed height for proper structure */
  perspective: 1000px;
  flex: 1 1 340px;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* ================= CARD FACES ================= */
.card-front,
.card-back {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 25px;
  color: white;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
}

/* Front image */
.card-front img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  transition: transform 0.4s ease;
  border: 3px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

/* Image zoom on click */
.card-front img.zoomed {
  transform: scale(1.5);
  z-index: 20;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
}

/* Card texts */
.card-front h3 {
  font-size: 1.6em;
  font-weight: 600;
  letter-spacing: 1px;
}

.card-front p {
  font-size: 1.1em;
  font-weight: 300;
  color: #e0e0e0;
}

/* Back side */
.card-back {
  transform: rotateY(180deg);
  text-align: center;
  font-size: 1.05em;
  line-height: 1.6;
  padding: 30px;
}

.card-back p {
  margin-bottom: 20px;
  font-weight: 300;
}

/* Floating text animation */
.p1 {
  margin-top: 25px;
  font-size: 0.9em !important;
  color: #ffde59 !important;
  font-weight: 500 !important;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* ================= SOCIAL ICONS ================= */
.social-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
}

.social-row a {
  text-decoration: none;
}

.social-row i {
  font-size: 28px;
  transition: all 0.3s ease;
}

.fa-instagram { color: #e1306c; }
.fa-github { color: #ffffff; }
.fa-linkedin { color: #0077b5; }

.social-row i:hover {
  transform: scale(1.3) translateY(-5px);
  filter: drop-shadow(0px 5px 8px rgba(255,255,255,0.4));
}

/* ================= RESPONSIVE ================= */
@media(max-width: 768px) {
  .team-container { gap: 30px; padding-top: 100px; }
  .card { height: 400px; }
}

@media(max-width: 480px) {
  .card {
    max-width: 90%;
    height: 380px;
  }
  .card-front img {
    width: 110px;
    height: 110px;
  }
  #toggleMode { top: 15px; right: 15px; font-size: 18px; padding: 10px 14px; }
}

@media(max-width: 360px) {
  .card-front h3 { font-size: 1.3em; }
  .card-front p, .card-back { font-size: 0.9em; }
  .card { height: 350px; }
}
</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker
      .register('./sw.js')
      .catch(err => console.error('SW registration failed:', err));
  });
}
</script>
<body>

<button id="toggleMode" title="Toggle Theme">
  <i id="modeIcon" class="fa-solid fa-moon"></i>
</button>

<div id="stars"></div>

<div class="team-container">

<div class="card">
  <div class="card-inner">
    <div class="card-front">
      <img src="./img/My Photo.png" alt="Rehan Khan" onerror="this.src='https://via.placeholder.com/130'">
      <h3>Rehan Khan</h3>
      <p>Founder & Developer</p>
      <p class="p1">Click Me To Flip!!</p>
    </div>
    <div class="card-back">
      <p>Hello! I'm Rehan Pathan, the creator of this platform. I love web development and building cool things!</p>
      <div class="social-row">
        <a href="https://www.instagram.com/iampathan.0?igsh=aXM2MGczbmh2MGJy" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/pathanrrkhan007-max" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/rehankhan-pathan-153113339" target="_blank"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>
  </div>
</div>

</div>

<script>
/* ===== Stars generate ===== */
function createStars() {
  const box = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 3 + "s";
    box.appendChild(s);
  }
}
createStars();

/* ===== Card flip & image zoom ===== */
document.querySelectorAll(".card").forEach(card => {
  const img = card.querySelector("img");

  img.onclick = e => {
    e.stopPropagation(); // Image pe click hone se card flip nahi hoga
    img.classList.toggle("zoomed");
  };

  card.onclick = () => {
    if (!img.classList.contains("zoomed")) {
      card.classList.toggle("flipped"); // Card flip hoga
    } else {
      img.classList.remove("zoomed"); // Agar zoomed hai aur card pe click kiya, toh zoom hatega
    }
  };
});

/* ===== Dark mode toggle ===== */
const toggleModeBtn = document.getElementById("toggleMode");
const modeIcon = document.getElementById("modeIcon");

toggleModeBtn.onclick = () => {
  document.body.classList.toggle("dark");
  modeIcon.classList.toggle("fa-moon");
  modeIcon.classList.toggle("fa-sun");
};

/* ===== Prevent Default Actions (Bugs Fixed) ===== */
document.onkeydown = function(e) {
  // Disable F12
  if(e.keyCode == 123) {
    e.preventDefault();
    alert("F12 is disabled on this site.");
    return false;
  }
  // Disable Ctrl+Shift+I (Inspect)
  if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
    e.preventDefault();
    alert("Inspect Element is disabled."); 
    return false;
  }
  // Disable Ctrl+U (View Source)
  if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
    e.preventDefault();
    alert("Viewing source code is disabled.");
    return false;
  }
};
</script>

</body>
</html>
